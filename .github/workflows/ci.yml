name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  node:
    name: Node checks
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
      SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key
      R2_ENDPOINT: https://example.r2.cloudflarestorage.com
      R2_ACCESS_KEY_ID: ci-r2-access-key
      R2_SECRET_ACCESS_KEY: ci-r2-secret-key
      R2_BUCKET: ci-source-bucket
      GEMINI_API_KEY: ci-gemini-key
      YOUTUBE_API_KEY: ci-youtube-key

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.34.1
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run type-check
        run: pnpm type-check

      - name: Build application
        run: pnpm build

  python:
    name: Python ingest worker checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/ingest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: workers/ingest/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run ingest worker tests
        run: python -m unittest test_worker.py test_storage.py
