services:
  ingest-server:
    build:
      context: ./workers/ingest
    command: uvicorn server:app --host 0.0.0.0 --port 8001
    env_file:
      - .env.local
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8001:8001"

  ingest-worker:
    build:
      context: ./workers/ingest
    command: python -u worker.py
    env_file:
      - .env.local
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      # Optional: place a Netscape-format cookies.txt here to bypass YouTube bot-detection.
      # Export from Chrome with "Get cookies.txt LOCALLY" extension while logged in to YouTube.
      - ./workers/ingest/cookies.txt:/app/cookies.txt:ro
    restart: unless-stopped
